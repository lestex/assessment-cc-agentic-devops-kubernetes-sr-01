name: CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 795619934351.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: 795619934351.dkr.ecr.us-east-1.amazonaws.com/fsl-challenge
  ECS_CLUSTER: fsl-challenge-cluster
  ECS_SERVICE: fsl-challenge-service
  TASK_DEFINITION: fsl-challenge
  CONTAINER_NAME: fsl-challenge

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to ECR
        id: build-image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REPOSITORY:latest \
            codebase/rdicidr-0.1.0/
          docker push $ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REPOSITORY:latest
          echo "image=$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEFINITION \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Create ECS service if it does not exist
        run: |
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[?status==`ACTIVE`].serviceName' \
            --output text)
          if [ -z "$SERVICE_STATUS" ]; then
            echo "Service not found — creating..."
            aws ecs create-service \
              --cluster $ECS_CLUSTER \
              --service-name $ECS_SERVICE \
              --task-definition $TASK_DEFINITION \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-f037e5b8,subnet-a542d2a9,subnet-62e9ac5e,subnet-d944a4f5,subnet-6c4e1309,subnet-77ddc32c],securityGroups=[sg-0f114691e7fa2f222],assignPublicIp=ENABLED}"
          else
            echo "Service already exists — skipping creation."
          fi

      - name: Deploy updated task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
